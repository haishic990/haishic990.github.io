<!DOCTYPE html>
4<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园二手交易系统</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="app">
        <!-- 登录页面 -->
        <div id="login-page" class="page">
            <div class="login-container">
                <h2>校园二手交易系统</h2>
                <div class="login-tabs">
                    <button class="tab-btn active" data-type="user">用户登录</button>
                    <button class="tab-btn" data-type="admin">管理员登录</button>
                </div>
                <div class="login-form">
                    <div class="form-group">
                        <label>邮箱</label>
                        <input type="email" id="username" placeholder="请输入邮箱">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="password" placeholder="请输入密码">
                    </div>
                    <button class="login-btn" onclick="handleLogin()">登录</button>
                    <div class="register-link">
                        还没有账号？<a href="#" onclick="showRegisterForm()">立即注册</a>
                    </div>
                </div>
                <div class="register-form" style="display: none;">
                    <h3>用户注册</h3>
                    <div class="form-group">
                        <label>邮箱</label>
                        <input type="email" id="reg-email" placeholder="请输入邮箱">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="reg-password" placeholder="密码至少8位，包含大小写字母">
                    </div>
                    <div class="form-group">
                        <label>确认密码</label>
                        <input type="password" id="reg-confirm-password" placeholder="请确认密码">
                    </div>
                    <button class="register-btn" onclick="handleRegister()">注册</button>
                    <div class="login-link">
                        已有账号？<a href="#" onclick="showLoginForm()">立即登录</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- 首页 -->
        <div id="index-page" class="page" style="display: none;">
            <header>
                <div class="header-content">
                    <h1>校园二手交易系统</h1>
                    <div class="user-info">
                        <span id="welcome-text"></span>
                        <button onclick="logout()" class="logout-btn">退出</button>
                    </div>
                </div>
            </header>
            <nav class="nav-bar">
                <button class="nav-btn active" data-page="index">首页</button>
                <button class="nav-btn" data-page="cart">购物车</button>
                <button class="nav-btn" data-page="publish">发布</button>
                <button class="nav-btn" data-page="profile">我的</button>
            </nav>
            <main class="main-content">
                <div class="action-section">
                    <button class="add-activity-btn" id="add-activity-btn" onclick="showAddActivityModal()"
                        style="display: none;">+ 添加活动</button>
                    <button class="add-product-btn" onclick="goToPublish()">+ 发布商品</button>
                </div>
                <div class="search-section">
                    <input type="text" id="search-input" placeholder="搜索商品或活动" oninput="onSearch()">
                </div>

                <!-- 活动列表 -->
                <div class="section">
                    <h2>社区活动</h2>
                    <div class="activity-list" id="activity-list">
                        <!-- 活动列表将通过JavaScript动态生成 -->
                    </div>
                </div>

                <!-- 商品列表 -->
                <div class="section">
                    <h2>二手商品</h2>
                    <div class="category-section">
                        <button class="category-btn active" data-category="">全部</button>
                        <button class="category-btn" data-category="数码">数码</button>
                        <button class="category-btn" data-category="书籍">书籍</button>
                        <button class="category-btn" data-category="生活用品">生活用品</button>
                        <button class="category-btn" data-category="服装">服装</button>
                        <button class="category-btn" data-category="其他">其他</button>
                    </div>
                    <div class="product-list" id="product-list">
                        <!-- 商品列表将通过JavaScript动态生成 -->
                    </div>
                </div>
            </main>
        </div>

        <!-- 添加活动弹窗 -->
        <div id="add-activity-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modal-title">添加活动</h3>
                    <button class="close-btn" onclick="hideAddActivityModal()">×</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label>活动名称</label>
                        <input type="text" id="activity-name" placeholder="请输入活动名称">
                    </div>
                    <div class="form-group">
                        <label>活动日期</label>
                        <input type="date" id="activity-date">
                    </div>
                    <div class="form-group">
                        <label>活动地点</label>
                        <input type="text" id="activity-location" placeholder="请输入活动地点">
                    </div>
                    <div class="form-group">
                        <label>活动描述</label>
                        <textarea id="activity-description" placeholder="请输入活动描述"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="action-btn secondary" onclick="hideAddActivityModal()">取消</button>
                    <button class="action-btn primary" onclick="saveActivity()">保存</button>
                </div>
            </div>
        </div>

        <!-- 商品详情页 -->
        <div id="detail-page" class="page" style="display: none;">
            <header>
                <div class="header-content">
                    <button class="back-btn" onclick="goBack()">← 返回</button>
                    <h1>商品详情</h1>
                </div>
            </header>
            <main class="main-content">
                <div class="product-detail" id="product-detail">
                    <!-- 商品详情将通过JavaScript动态生成 -->
                </div>
            </main>
        </div>

        <!-- 发布商品页 -->
        <div id="publish-page" class="page" style="display: none;">
            <header>
                <div class="header-content">
                    <button class="back-btn" onclick="goBack()">← 返回</button>
                    <h1>发布商品</h1>
                </div>
            </header>
            <main class="main-content">
                <form class="publish-form">
                    <div class="form-group">
                        <label>商品标题</label>
                        <input type="text" id="publish-title" placeholder="请输入商品标题">
                    </div>
                    <div class="form-group">
                        <label>商品图片</label>
                        <div class="image-upload-section">
                            <input type="file" id="publish-image" accept="image/*" style="display: none;"
                                onchange="handleImageUpload(event)">
                            <div class="image-upload-area" onclick="document.getElementById('publish-image').click()">
                                <div id="image-preview" style="display: none;">
                                    <img id="preview-img" src="" alt="商品图片">
                                    <button class="remove-image-btn" onclick="removeImage()">×</button>
                                </div>
                                <div id="upload-hint" class="upload-hint">
                                    <span class="upload-icon">📷</span>
                                    <span>点击上传图片</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>商品价格</label>
                        <input type="number" id="publish-price" placeholder="请输入商品价格">
                    </div>
                    <div class="form-group">
                        <label>商品分类</label>
                        <select id="publish-category">
                            <option value="">请选择分类</option>
                            <option value="数码">数码</option>
                            <option value="书籍">书籍</option>
                            <option value="生活用品">生活用品</option>
                            <option value="服装">服装</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>商品描述</label>
                        <textarea id="publish-description" placeholder="请输入商品描述"></textarea>
                    </div>
                    <div class="form-group">
                        <label>联系人</label>
                        <input type="text" id="publish-seller" placeholder="请输入联系人姓名" disabled>
                    </div>
                    <div class="form-group">
                        <label>联系电话</label>
                        <input type="tel" id="publish-phone" placeholder="请输入联系电话">
                    </div>
                    <button type="button" class="submit-btn" onclick="submitPublish()">发布商品</button>
                </form>
            </main>
        </div>

        <!-- 购物车页面 -->
        <div id="cart-page" class="page" style="display: none;">
            <header>
                <div class="header-content">
                    <button class="back-btn" onclick="goBack()">← 返回</button>
                    <h1>购物车</h1>
                </div>
            </header>
            <main class="main-content">
                <div class="cart-list" id="cart-list">
                    <!-- 购物车列表将通过JavaScript动态生成 -->
                </div>
                <div class="cart-total" id="cart-total">
                    <!-- 购物车总计将通过JavaScript动态生成 -->
                </div>
            </main>
        </div>

        <!-- 个人中心页面 -->
        <div id="profile-page" class="page" style="display: none;">
            <header>
                <div class="header-content">
                    <button class="back-btn" onclick="goBack()">← 返回</button>
                    <h1>个人中心</h1>
                </div>
            </header>
            <main class="main-content">
                <div class="user-profile" id="user-profile">
                    <!-- 用户信息将通过JavaScript动态生成 -->
                </div>
                <div class="profile-menu">
                    <button class="menu-item" onclick="goToMyProducts()">我的发布</button>
                    <button class="menu-item" onclick="goToOrders()">我的订单</button>
                    <button class="menu-item" onclick="goToFavorites()">我的收藏</button>
                    <button class="menu-item" onclick="goToAddress()">收货地址</button>
                </div>
                <div class="admin-menu" id="admin-menu" style="display: none;">
                    <button class="menu-item" onclick="goToUsers()">用户管理</button>
                    <button class="menu-item" onclick="goToAudit()">商品审核</button>
                    <button class="menu-item" onclick="goToStatistics()">数据统计</button>
                </div>
            </main>
        </div>

        <!-- 我的发布页面 -->
        <div id="myproducts-page" class="page" style="display: none;">
            <header>
                <div class="header-content">
                    <button class="back-btn" onclick="goBack()">← 返回</button>
                    <h1>我的发布</h1>
                </div>
            </header>
            <main class="main-content">
                <div class="product-tabs">
                    <button class="tab-btn active" data-status="all">全部</button>
                    <button class="tab-btn" data-status="pending">待审核</button>
                    <button class="tab-btn" data-status="approved">已通过</button>
                    <button class="tab-btn" data-status="rejected">已拒绝</button>
                </div>
                <div class="product-list" id="my-products-list">
                    <!-- 我的商品列表将通过JavaScript动态生成 -->
                </div>
            </main>
        </div>

        <!-- 我的订单页面 -->
        <div id="orders-page" class="page" style="display: none;">
            <header>
                <div class="header-content">
                    <button class="back-btn" onclick="goBack()">← 返回</button>
                    <h1>我的订单</h1>
                </div>
            </header>
            <main class="main-content">
                <div class="order-list" id="order-list">
                    <!-- 订单列表将通过JavaScript动态生成 -->
                </div>
            </main>
        </div>

        <!-- 我的收藏页面 -->
        <div id="favorites-page" class="page" style="display: none;">
            <header>
                <div class="header-content">
                    <button class="back-btn" onclick="goBack()">← 返回</button>
                    <h1>我的收藏</h1>
                </div>
            </header>
            <main class="main-content">
                <div class="product-list" id="favorites-list">
                    <!-- 收藏列表将通过JavaScript动态生成 -->
                </div>
            </main>
        </div>

        <!-- 收货地址页面 -->
        <div id="address-page" class="page" style="display: none;">
            <header>
                <div class="header-content">
                    <button class="back-btn" onclick="goBack()">← 返回</button>
                    <h1>收货地址</h1>
                    <button class="add-btn" onclick="showAddAddressForm()">添加</button>
                </div>
            </header>
            <main class="main-content">
                <div class="address-list" id="address-list">
                    <!-- 地址列表将通过JavaScript动态生成 -->
                </div>
                <div class="add-address-form" id="add-address-form" style="display: none;">
                    <h3>添加收货地址</h3>
                    <div class="form-group">
                        <label>收货人</label>
                        <input type="text" id="address-name" placeholder="请输入收货人姓名">
                    </div>
                    <div class="form-group">
                        <label>手机号</label>
                        <input type="tel" id="address-phone" placeholder="请输入手机号">
                    </div>
                    <div class="form-group">
                        <label>详细地址</label>
                        <textarea id="address-detail" placeholder="请输入详细地址"></textarea>
                    </div>
                    <div class="form-group">
                        <label>邮编</label>
                        <input type="text" id="address-zip" placeholder="请输入邮编">
                    </div>
                    <div class="form-group">
                        <input type="checkbox" id="address-default">
                        <label for="address-default">设为默认地址</label>
                    </div>
                    <div class="form-actions">
                        <button class="action-btn secondary" onclick="hideAddAddressForm()">取消</button>
                        <button class="action-btn primary" onclick="saveAddress()">保存</button>
                    </div>
                </div>
            </main>
        </div>

        <!-- 商品审核页面 -->
        <div id="audit-page" class="page" style="display: none;">
            <header>
                <div class="header-content">
                    <button class="back-btn" onclick="goBack()">← 返回</button>
                    <h1>商品审核</h1>
                </div>
            </header>
            <main class="main-content">
                <div class="product-list" id="audit-list">
                    <!-- 待审核商品列表将通过JavaScript动态生成 -->
                </div>
            </main>
        </div>

        <!-- 用户管理页面 -->
        <div id="users-page" class="page" style="display: none;">
            <header>
                <div class="header-content">
                    <button class="back-btn" onclick="goBack()">← 返回</button>
                    <h1>用户管理</h1>
                </div>
            </header>
            <main class="main-content">
                <div class="user-query-section">
                    <h3>用户查询（模拟Servlet）</h3>
                    <div class="query-form">
                        <input type="number" id="query-user-id" placeholder="输入用户ID (1-3)" min="1" max="3">
                        <button class="action-btn primary" onclick="queryUser()">查询</button>
                        <button class="action-btn secondary" onclick="queryAllUsers()">显示全部</button>
                    </div>
                    <div id="query-result" class="query-result"></div>
                </div>
                <div class="user-list" id="user-list">
                    <h3>所有用户列表</h3>
                    <!-- 用户列表将通过JavaScript动态生成 -->
                </div>
            </main>
        </div>

        <!-- 数据统计页面 -->
        <div id="statistics-page" class="page" style="display: none;">
            <header>
                <div class="header-content">
                    <button class="back-btn" onclick="goBack()">← 返回</button>
                    <h1>数据统计</h1>
                </div>
            </header>
            <main class="main-content">
                <div class="statistics-container" id="statistics-container">
                    <!-- 统计数据将通过JavaScript动态生成 -->
                </div>
            </main>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
